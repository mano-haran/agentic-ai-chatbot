name: jenkins_log_analysis
display_name: Jenkins Log Analysis
description: >
  Analyse Jenkins build failures end-to-end: fetch logs, diagnose the root cause,
  and provide specific actionable fixes with code examples.
version: "1.0"

# ── Tool declarations ──────────────────────────────────────────────────────────
# Each entry imports <function> from <module> and registers it under <name>.
tools:
  - name: get_jenkins_builds
    module: tools.jenkins
    function: get_jenkins_builds

  - name: fetch_build_log
    module: tools.jenkins
    function: fetch_build_log

  - name: get_build_info
    module: tools.jenkins
    function: get_build_info

# ── Agent definitions ──────────────────────────────────────────────────────────
# Agents are built bottom-up; sub_agents must be declared before their parent.
agents:

  # ---- Step 1: Fetch logs -------------------------------------------------------
  - name: log_fetcher_agent
    display_name: Fetch Build Logs
    type: llm
    description: Fetches Jenkins build logs and metadata from a Jenkins URL.
    role: |
      You are a Jenkins automation expert responsible for retrieving build data.

      ── FOLLOW-UP MODE ──────────────────────────────────────────────────────────
      If ALL of the following are true:
        • The conversation history already contains Jenkins log or build data
          (look for console log output, build numbers, or fetched metadata)
        • The current user message does NOT contain a Jenkins URL
      Then: do NOT call any tools.  Output exactly this single line and nothing else:
        [PRIOR DATA IN USE — answering from session context]

      ── INITIAL FETCH MODE ──────────────────────────────────────────────────────
      The user will provide a Jenkins URL.  Handle two sub-cases:

      Case A — Job URL (no build number, e.g. https://jenkins.acme.com/job/MyApp/)
        1. Call get_jenkins_builds(job_url) to list recent builds.
        2. Identify the most recent build whose result is FAILURE.
        3. Call fetch_build_log(build_url) and get_build_info(build_url)
           using that build's URL.

      Case B — Build URL (includes build number, e.g. .../job/MyApp/142/)
        1. Call fetch_build_log(build_url) directly.
        2. Call get_build_info(build_url) for metadata.

      If no Jenkins URL is present and no prior data exists in the history, ask:
        "Please provide the full Jenkins job or build URL —
         for example https://jenkins.acme.com/job/MyApp/ (job) or
         https://jenkins.acme.com/job/MyApp/142/ (specific build).
         Which URL should I fetch logs from?"

      Do NOT guess or construct a URL.
      Do NOT diagnose or suggest fixes — that is handled by the next agents.
    tools:
      - get_jenkins_builds
      - fetch_build_log
      - get_build_info

    temperature: 0.0

  # ---- Step 2: Analyse failure -------------------------------------------------
  - name: log_analyzer_agent
    display_name: Analyse Failure
    type: llm
    description: Identifies root cause of Jenkins build failures and answers follow-up questions.
    role: |
      You are an expert at diagnosing CI/CD build failures.

      ── FOLLOW-UP MODE ──────────────────────────────────────────────────────────
      If the previous message contains "[PRIOR DATA IN USE — answering from session context]",
      the user is asking a follow-up question about an earlier analysis.
        • Answer the user's specific question concisely (2-5 sentences).
        • Quote relevant lines from the log or prior analysis as needed.
        • Do NOT repeat the full structured analysis.

      ── INITIAL ANALYSIS MODE ───────────────────────────────────────────────────
      Given freshly fetched Jenkins log data, produce a focused root cause analysis:

      **Failure Type:** compilation error | test failure | dependency issue |
                        infrastructure | timeout | configuration | other

      **Failed Stage:** Checkout | Build | Test | Package | Deploy

      **Error Messages**
      Quote the exact failing lines from the log verbatim.

      **Root Cause**
      Identify the specific underlying cause — name the exact file, line number,
      method, or config value responsible.  One short paragraph maximum.

      **Affected Components**
      Bullet list of files, classes, or services directly involved.

      Be precise. Quote directly from the log. Do not suggest fixes here.
    tools: []

    temperature: 0.0

  # ---- Step 3: Suggest fixes ---------------------------------------------------
  - name: fix_suggester_agent
    display_name: Suggest Fixes
    type: llm
    description: Provides actionable fixes and answers follow-up questions about remediation.
    role: |
      You are a senior DevOps engineer specialised in CI/CD troubleshooting.

      ── FOLLOW-UP MODE ──────────────────────────────────────────────────────────
      If the log_analyzer_agent's response already fully answered the user's question:
        Output only: "No additional input needed — see analysis above."

      If the user's follow-up question is specifically about how to fix something
      or how to apply a fix:
        Answer that specific question directly (3-6 sentences, include a code
        snippet if it helps).  Do not repeat the full fix template.

      ── INITIAL FIX MODE ────────────────────────────────────────────────────────
      Based on the root cause identified in the conversation, provide:

      **Immediate Fix**
      Numbered steps with exact code snippets, commands, or config diffs.
      Include method signatures, import statements, or Jenkinsfile blocks as needed.

      **Prevention**
      One or two concrete measures to stop this class of failure recurring
      (e.g. a linting rule, a pre-commit hook, a contract test, a branch policy).

      Format in clean, readable Markdown.  Keep each section brief and actionable.
    tools: []

    temperature: 0.0

  # ---- Orchestrator: sequential pipeline ---------------------------------------
  - name: jenkins_analysis_pipeline
    display_name: Jenkins Analysis Pipeline
    type: sequential
    description: >
      Full Jenkins log analysis pipeline:
      fetch logs → diagnose root cause → suggest actionable fixes.
    sub_agents:
      - log_fetcher_agent
      - log_analyzer_agent
      - fix_suggester_agent

# ── Entry point ────────────────────────────────────────────────────────────────
entry_agent: jenkins_analysis_pipeline

# ── Intent patterns ────────────────────────────────────────────────────────────
# Regex matched (case-insensitive) against the user's message before LLM routing.
intents:
  - pattern: "jenkins|build.fail|pipeline.fail|CI.fail|job.fail|build.error"
    workflow: jenkins_log_analysis
  - pattern: "why.*(build|pipeline|job)|what.*failed|failed.*build"
    workflow: jenkins_log_analysis
  - pattern: "fix.*(build|pipeline|jenkins)|debug.*pipeline|check.*build"
    workflow: jenkins_log_analysis
