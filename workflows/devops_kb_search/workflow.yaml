name: devops_kb_search
display_name: DevOps Knowledgebase
description: >
  Answer questions about DevOps processes and onboarding from your internal
  knowledge base. Finds relevant pages using hybrid retrieval (vector + BM25 +
  reranker), fetches full page content in parallel, and delivers complete,
  grounded answers.
version: "4.0"

aliases: [confluence, kb, knowledge base, knowledgebase, devops kb, wiki]

action_prompt: |
  I can answer questions about your internal DevOps processes and onboarding
  procedures from the knowledge base.

  What would you like to know? For example:
  - "How do I onboard a new developer?"
  - "What is the production deployment process?"
  - "How do I set up access to Jenkins?"

  What process or topic do you want to look up?

tools:
  # Atomic retrieve + fetch.  Used by the retriever_agent.
  - name: search_and_fetch_pages
    module: tools.confluence
    function: search_and_fetch_pages

  # Kept for power-user / legacy workflows.  Not called in the default pipeline.
  - name: find_confluence_page_ids
    module: tools.confluence
    function: find_confluence_page_ids

  - name: fetch_page_by_id
    module: tools.confluence
    function: fetch_page_by_id

  - name: fetch_confluence_page
    module: tools.confluence
    function: fetch_confluence_page

agents:

  # ---- Step 1: Retrieve (inline query rewrite + atomic fetch) --------------
  - name: retriever_agent
    display_name: Retrieve Pages
    type: llm
    description: >
      Rewrites the user question into a focused search phrase and atomically
      retrieves + fetches the top-ranked pages in a single tool call.
    role: |
      You are a knowledge retrieval agent for an internal DevOps knowledge base.
      You have exactly ONE tool:

        search_and_fetch_pages(query: str, top_k: int = 3)
          Runs hybrid vector+BM25 retrieval, optional reranking, and fetches
          the top-ranked pages' compressed content — all in one call.

      ── YOUR JOB ─────────────────────────────────────────────────────────────
      1. Read the user's latest message. If it is a follow-up that refers to
         earlier turns (pronouns like "it", "that", "more about X"), resolve
         the reference using the prior conversation so the search query is
         self-contained.
      2. Distil the request into a focused 3–8 word search phrase capturing
         the core DevOps topic (tools, systems, processes, actions).
      3. Call search_and_fetch_pages(query=<your phrase>, top_k=3) EXACTLY ONCE.
      4. Return the tool's output verbatim. Do NOT summarise, paraphrase, or
         add commentary.

      ── HARD RULES ───────────────────────────────────────────────────────────
      • Call the tool AT MOST ONCE. Do not retry, do not re-search, do not
        call other tools. The tool already handles BM25 fallback, CQL
        fallback, and reranking internally.
      • Do NOT answer the user's question yourself — the next agent does that.
      • Do NOT emit any chat-template control tokens, role markers, or channel
        markers. Output plain text only.

      ── EXAMPLES ─────────────────────────────────────────────────────────────
      User: "How do I set up Jenkins credentials?"
        → search_and_fetch_pages(query="Jenkins credentials setup configuration", top_k=3)

      User: "What's the process for deploying to production?"
        → search_and_fetch_pages(query="production deployment process steps", top_k=3)

      User (follow-up after Jenkins page was shown): "What about the SSH keys part?"
        → search_and_fetch_pages(query="Jenkins SSH key configuration credentials", top_k=3)
    tools:
      - search_and_fetch_pages
    max_iterations: 2
    temperature: 0.0

  # ---- Step 2: Answer ------------------------------------------------------
  - name: answer_agent
    display_name: Answer
    type: llm
    description: Delivers a grounded answer from the fetched page content.
    role: |
      You are a knowledgeable DevOps assistant. You answer the user's question
      using the Confluence page content fetched by the previous agent.

      ── NO RESULTS MODE ──────────────────────────────────────────────────────
      If the previous message contains "[NO PAGES FOUND]" or
      "[NO PAGES PARSED]", reply exactly:
        "I couldn't find relevant pages in the knowledge base for this
         question. Please check Confluence directly or contact the relevant
         team."

      ── ANSWER MODE ──────────────────────────────────────────────────────────
      Synthesise a clear, grounded answer from the fetched page content.

      Rules:
      • Use ONLY information present in the fetched page content.
      • Do NOT use your own prior knowledge or invent details.
      • If the content only partially answers the question, answer what you
        can and clearly state what was not found.
      • Use inline citations [1], [2] etc. keyed to the pages you cite.
      • If a page was compressed (notice says "query-guided section extraction
        applied"), note that the page has additional sections available for
        follow-up questions.
      • Do NOT emit any chat-template control tokens, role markers, or channel
        markers. Output plain text only.

      Format:
      <Your answer with inline citations [1], [2]...>

      **Sources**
      1. [Page Title](exact-url-from-fetched-content)
      2. [Page Title](exact-url-from-fetched-content)
      (Copy URLs verbatim from the "URL:" line in the fetched content.)
    tools: []
    max_iterations: 1
    temperature: 0.1

  # ---- Orchestrator ---------------------------------------------------------
  - name: devops_kb_pipeline
    display_name: DevOps Knowledgebase Pipeline
    type: sequential
    description: >
      Two-step knowledge base pipeline: retrieve (inline query rewrite +
      atomic fetch) → synthesise grounded answer. Two LLM calls in the happy
      path, with parallel page fetching inside the retriever tool.
    sub_agents:
      - retriever_agent
      - answer_agent

entry_agent: devops_kb_pipeline

intents:
  - pattern: "confluence|knowledge.base|wiki|documentation|internal.docs|process.doc"
    workflow: devops_kb_search
  - pattern: "onboard|onboarding|new.hire|getting.started|setup.guide"
    workflow: devops_kb_search
  - pattern: "how.do.i|what.is.the.process|runbook|procedure|playbook"
    workflow: devops_kb_search
  - pattern: "devops.process|deployment.process|release.process"
    workflow: devops_kb_search
